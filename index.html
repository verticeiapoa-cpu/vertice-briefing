<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Briefing Vértice</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:650px;
}

.step{
display:none;
animation:fade .5s;
}

.step.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.progress{
height:6px;
background:#1e293b;
margin-bottom:40px;
border-radius:6px;
}

.progress-bar{
height:6px;
width:0%;
background:#6366f1;
border-radius:6px;
transition:.4s;
}

button{
background:#6366f1;
border:none;
padding:14px 30px;
color:white;
font-size:16px;
border-radius:8px;
margin-top:25px;
cursor:pointer;
}

input,select{
width:100%;
padding:12px;
border-radius:6px;
border:none;
margin-top:10px;
}

.design-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.design{
cursor:pointer;
border:2px solid transparent;
}

.design img{
width:100%;
border-radius:10px;
}

.design.selected{
border:2px solid #6366f1;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<!-- STEP 1 -->

<div class="step active">

<h1>Vamos criar seu projeto</h1>
<p>Leva menos de 2 minutos</p>

<button onclick="next()">Começar</button>

</div>

<!-- STEP 2 -->

<div class="step">

<h2>Nome da empresa</h2>

<input id="empresa">

<button onclick="next()">Próximo</button>

</div>

<!-- STEP 3 -->

<div class="step">

<h2>Qual objetivo do site?</h2>

<select id="objetivo">

<option>Vender produtos</option>
<option>Captar leads</option>
<option>Portfólio</option>
<option>Institucional</option>

</select>

<button onclick="next()">Próximo</button>

</div>

<!-- STEP 4 -->

<div class="step">

<h2>Escolha um estilo visual</h2>

<div class="design-grid">

<div class="design" onclick="selectDesign(this,'minimalista')">
<img src="https://picsum.photos/400/250?1">
<p>Minimalista</p>
</div>

<div class="design" onclick="selectDesign(this,'corporativo')">
<img src="https://picsum.photos/400/250?2">
<p>Corporativo</p>
</div>

<div class="design" onclick="selectDesign(this,'premium')">
<img src="https://picsum.photos/400/250?3">
<p>Premium</p>
</div>

<div class="design" onclick="selectDesign(this,'moderno')">
<img src="https://picsum.photos/400/250?4">
<p>Moderno</p>
</div>

</div>

<button onclick="next()">Próximo</button>

</div>

<!-- STEP 5 -->

<div class="step">

<h2>Prazo estimado</h2>

<select id="prazo">

<option>1 semana</option>
<option>2 semanas</option>
<option>1 mês</option>

</select>

<button onclick="finalizar()">Finalizar</button>

</div>

<!-- FINAL -->

<div class="step">

<h2>Obrigado!</h2>

<p>Recebemos seu briefing.</p>

</div>

</div>

<!-- ÁREA OCULTA (SÓ VOCÊ) -->

<div class="hidden" id="admin">

<button onclick="gerarProjeto()">Gerar Projeto</button>

<button onclick="exportarPDF()">Exportar PDF</button>

<pre id="resultado"></pre>

</div>

<script>

let step=0
let design=""

function next(){

let steps=document.querySelectorAll(".step")

steps[step].classList.remove("active")

step++

steps[step].classList.add("active")

updateProgress()

}

function updateProgress(){

let total=document.querySelectorAll(".step").length-1
let percent=(step/total)*100

document.getElementById("progress").style.width=percent+"%"

}

function selectDesign(el,value){

document.querySelectorAll(".design").forEach(d=>d.classList.remove("selected"))

el.classList.add("selected")

design=value

}

function finalizar(){

next()

document.getElementById("admin").style.display="block"

}

function gerarProjeto(){

let empresa=document.getElementById("empresa").value
let objetivo=document.getElementById("objetivo").value
let prazo=document.getElementById("prazo").value

let promptLovable=

`Crie um website para a empresa ${empresa}

Objetivo: ${objetivo}

Estilo: ${design}

Prazo: ${prazo}

Estruture UX, layout e páginas.`

let promptUI=

`UI design para website ${empresa}

Estilo visual ${design}

Objetivo ${objetivo}

Criar interface moderna.`

let wireframe=

`
HOME
Hero
Serviços
Prova social
CTA

PÁGINAS
Sobre
Serviços
Contato
`

let proposta=

`
Projeto Web

Cliente: ${empresa}

Objetivo: ${objetivo}

Prazo: ${prazo}

Inclui:
Design
UX
Desenvolvimento
Entrega completa
`

let resultado=

`

PROMPT LOVABLE
${promptLovable}

PROMPT UI
${promptUI}

WIREFRAME
${wireframe}

PROPOSTA
${proposta}

`

document.getElementById("resultado").textContent=resultado

}

function exportarPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let texto=document.getElementById("resultado").textContent

doc.text(texto,10,10)

doc.save("projeto.pdf")

}

</script>

</body>
</html>
