<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Briefing Vértice</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
width:600px;
text-align:center;
}

.step{
display:none;
}

.step.active{
display:block;
}

button{
background:#6366f1;
border:none;
color:white;
padding:15px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
}

.design-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.design-option{
border:2px solid transparent;
cursor:pointer;
}

.design-option img{
width:100%;
border-radius:8px;
}

.design-option.selected{
border:2px solid #6366f1;
}

</style>
</head>

<body>

<div class="container">

<!-- Etapa 1 -->
<div class="step active">

<h1>Vamos criar seu projeto</h1>

<p>Leva apenas 2 minutos</p>

<button onclick="next()">Começar</button>

</div>

<!-- Etapa 2 -->

<div class="step">

<h2>Nome da empresa</h2>

<input id="empresa">

<button onclick="next()">Próximo</button>

</div>

<!-- Etapa 3 -->

<div class="step">

<h2>Objetivo do site</h2>

<select id="objetivo">

<option>Vender produtos</option>
<option>Captar leads</option>
<option>Mostrar portfólio</option>
<option>Institucional</option>

</select>

<button onclick="next()">Próximo</button>

</div>

<!-- Etapa 4 -->

<div class="step">

<h2>Escolha o estilo visual</h2>

<div class="design-grid">

<div class="design-option" onclick="selectDesign(this,'minimalista')">
<img src="https://picsum.photos/400/250?1">
<p>Minimalista</p>
</div>

<div class="design-option" onclick="selectDesign(this,'corporativo')">
<img src="https://picsum.photos/400/250?2">
<p>Corporativo</p>
</div>

<div class="design-option" onclick="selectDesign(this,'premium')">
<img src="https://picsum.photos/400/250?3">
<p>Premium</p>
</div>

<div class="design-option" onclick="selectDesign(this,'moderno')">
<img src="https://picsum.photos/400/250?4">
<p>Moderno</p>
</div>

</div>

<button onclick="next()">Próximo</button>

</div>

<!-- Etapa final -->

<div class="step">

<h2>Obrigado!</h2>

<p>Seu briefing foi enviado.</p>

<button onclick="gerar()">Gerar Projeto</button>

</div>

</div>

<script>

let step=0
let design=""

function next(){

let steps=document.querySelectorAll(".step")

steps[step].classList.remove("active")

step++

steps[step].classList.add("active")

}

function selectDesign(el,value){

document.querySelectorAll(".design-option").forEach(e=>e.classList.remove("selected"))

el.classList.add("selected")

design=value

}

function gerar(){

let empresa=document.getElementById("empresa").value
let objetivo=document.getElementById("objetivo").value

let prompt=`

Crie um website para a empresa ${empresa}

Objetivo: ${objetivo}

Estilo visual: ${design}

Estruture layout, seções e experiência do usuário.

`

console.log(prompt)

alert("Projeto gerado no console")

}

</script>

</body>
</html>
